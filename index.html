<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Manager Pro</title>
    <style>
        :root { --red: #e63946; --black: #1a1a1a; --white: #ffffff; --gray: #f4f4f4; --dark-gray: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--white); color: var(--black); margin: 0; padding: 0; }
        header { background-color: var(--black); color: var(--white); padding: 1.5rem; text-align: center; border-bottom: 4px solid var(--red); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        nav { display: flex; justify-content: center; background: var(--dark-gray); position: sticky; top: 0; z-index: 100; }
        nav button { background: none; border: none; color: white; padding: 1rem; cursor: pointer; font-weight: bold; transition: 0.3s; flex: 1; border-bottom: 3px solid transparent; }
        nav button:hover { background-color: #444; }
        nav button.active { border-bottom: 3px solid var(--red); background-color: var(--black); }
        .container { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: var(--white); border: 1px solid #ddd; padding: 1.2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        h2 { border-left: 5px solid var(--red); padding-left: 10px; text-transform: uppercase; font-size: 1.1rem; margin-top: 0; }
        input { width: 100%; padding: 0.8rem; margin: 0.5rem 0 1rem 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        button.primary { background-color: var(--red); color: white; border: none; padding: 1rem; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; }
        button.primary:active { transform: scale(0.98); }
        
        .player-select-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .player-item-btn { padding: 8px 15px; border: 1px solid #ddd; background: #eee; cursor: pointer; border-radius: 20px; font-size: 0.9rem; transition: 0.2s; }
        .player-item-btn.selected { background: var(--red); color: white; border-color: var(--red); box-shadow: 0 2px 5px rgba(230, 57, 70, 0.4); }

        .delete-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .delete-btn { background: none; color: var(--red); border: 1px solid var(--red); padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background-color: var(--black); color: var(--white); text-align: left; padding: 10px; font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        
        .months-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #f9f9f9; padding: 12px; border-radius: 4px; border: 1px solid #ddd; }
        .month-tag-list { display: flex; gap: 3px; }
        .month-tag { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 3px; font-size: 0.65rem; font-weight: bold; font-family: sans-serif; }
        .paid { background-color: #2ecc71; color: white; }
        .unpaid { background-color: #e0e0e0; color: #999; }
    </style>
</head>
<body>

<header>TEAM MANAGER PRO</header>

<nav>
    <button onclick="showSection('spieler')" id="btn-spieler" class="active">SPIELER</button>
    <button onclick="showSection('bearbeiten')" id="btn-bearbeiten">BEARBEITEN</button>
    <button onclick="showSection('kader')" id="btn-kader">KADER</button>
</nav>

<div class="container">
    
    <div id="spieler" class="section active">
        <div class="card">
            <h2>Neuen Spieler hinzufügen</h2>
            <input type="text" id="playerName" placeholder="Name eingeben (z.B.
Max Mustermann)">
            <button class="primary" onclick="addPlayer()">Spieler Speichern</button>
        </div>
        <div class="card">
            <h2>Eingetragene Spieler</h2>
            <div id="playerList"></div>
        </div>
    </div>

    <div id="bearbeiten" class="section">
        <div class="card">
            <h2>Spieler zum Bearbeiten wählen</h2>
            <div class="player-select-list" id="editPlayerList"></div>

            <div id="editFields" style="display:none; border-top: 3px solid var(--red); margin-top: 1rem; padding-top: 1rem;">
                <h3 id="editingPlayerName" style="margin-top:0">---</h3>
                
                <label>Geburtstag:</label>
                <input type="date" id="editDob">

                <label>Trikotgröße:</label>
                <input type="text" id="editSize" placeholder="z.B. L">
                
                <label>Felge (Anzahl):</label>
                <input type="number" id="editFelge" value="0">

                <label>Monatsbeiträge (Haken = Bezahlt):</label>
                <div class="months-grid" id="monthsGrid"></div>
                
                <button class="primary" style="margin-top: 1.5rem;" onclick="saveChanges()">Daten übernehmen</button>
            </div>
        </div>
    </div>

    <div id="kader" class="section">
        <div class="card">
            <h2>Kaderübersicht</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Geburtstag</th>
                            <th>Größe</th>
                            <th>Felge</th>
                            <th>Beiträge (J-D)</th>
                        </tr>
                    </thead>
                    <tbody id="kaderTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialisierung der Daten
    let players = [];
    try {
        const data = localStorage.getItem('teamManagerData');
        if (data) players = JSON.parse(data);
    } catch (e) { console.error("Speicherfehler", e); }

    let currentPlayerId = null;
    const months = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];

    // Navigation
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        
        if(id === 'spieler') renderPlayerList();
        if(id === 'bearbeiten') renderEditPlayerList();
        if(id === 'kader') renderKader();
    }

    // Spieler hinzufügen
    function addPlayer() {
        const input = document.getElementById('playerName');
        const name = input.value.trim();
        
        if(name === "") {
            alert("Bitte einen Namen eingeben!");
            return;
        }

        const newPlayer = {
            id: "id-" + Date.now(),
            name: name,
            dob: "",
            size: "-",
            felge: 0,
            payments: new Array(12).fill(false)
        };

        players.push(newPlayer);
        saveAndRefresh();
        input.value = "";
        renderPlayerList();
        alert(name + " wurde hinzugefügt!");
    }

    function renderPlayerList() {
        const list = document.getElementById('playerList');
        if(players.length === 0) {
            list.innerHTML = "<p style='color: #999;'>Noch keine Spieler in der Liste.</p>";
            return;
        }
        list.innerHTML = players.map(p => `
            <div class="delete-list-item">
                <span><strong>${p.name}</strong></span>
                <button class="delete-btn" onclick="deletePlayer('${p.id}')">Löschen</button>
            </div>
        `).join('');
    }

    function deletePlayer(id) {
if(confirm("Spieler wirklich entfernen?")) {
            players = players.filter(p => p.id !== id);
            saveAndRefresh();
            renderPlayerList();
        }
    }

    // Bearbeiten Logik
    function renderEditPlayerList() {
        const container = document.getElementById('editPlayerList');
        if(players.length === 0) {
            container.innerHTML = "<p>Keine Spieler vorhanden.</p>";
            return;
        }
        container.innerHTML = players.map(p => `
            <div class="player-item-btn ${currentPlayerId === p.id ? 'selected' : ''}" 
                 onclick="selectPlayerToEdit('${p.id}')">${p.name}</div>
        `).join('');
    }

    function selectPlayerToEdit(id) {
        currentPlayerId = id;
        const p = players.find(p => p.id === id);
        renderEditPlayerList();
        
        document.getElementById('editFields').style.display = "block";
        document.getElementById('editingPlayerName').innerText = p.name + " bearbeiten";
        document.getElementById('editDob').value = p.dob || "";
        document.getElementById('editSize').value = p.size || "-";
        document.getElementById('editFelge').value = p.felge || 0;

        const grid = document.getElementById('monthsGrid');
        grid.innerHTML = months.map((m, i) => `
            <div style="display:flex; align-items:center; gap:5px;">
                <input type="checkbox" id="m-${i}" ${p.payments[i] ? 'checked' : ''}>
                <label for="m-${i}" style="font-size:0.8rem">${m}</label>
            </div>
        `).join('');
    }

    function saveChanges() {
        const idx = players.findIndex(p => p.id === currentPlayerId);
        if(idx === -1) return;

        players[idx].dob = document.getElementById('editDob').value;
        players[idx].size = document.getElementById('editSize').value;
        players[idx].felge = document.getElementById('editFelge').value;
        players[idx].payments = months.map((_, i) => document.getElementById(`m-${i}`).checked);

        saveAndRefresh();
        alert("Daten gespeichert!");
        showSection('kader');
    }

    // Kader Logik
    function renderKader() {
        const tbody = document.getElementById('kaderTableBody');
        if(players.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center'>Keine Daten vorhanden</td></tr>";
            return;
        }
        tbody.innerHTML = players.map(p => {
            const dateStr = p.dob ? p.dob.split('-').reverse().join('.') : "-";
            const payIcons = p.payments.map((paid, i) => 
                <div class="month-tag ${paid ? 'paid' : 'unpaid'}" title="${months[i]}">${months[i][0]}</div>
            ).join('');

            return `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${dateStr}</td>
                    <td>${p.size}</td>
                    <td>${p.felge}</td>
                    <td><div class="month-tag-list">${payIcons}</div></td>
                </tr>
            `;
        }).join('');
    }

    function saveAndRefresh() {
        try {
            localStorage.setItem('teamManagerData', JSON.stringify(players));
        } catch(e) { alert("Speichern fehlgeschlagen!"); }
    }

    // Initialisierung beim ersten Laden
    renderPlayerList();
</script>

</body>
</html>
