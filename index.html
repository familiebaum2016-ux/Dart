<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dart Team Manager</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0f0f0f;
    color: #fff;
}

header {
    background: #000;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    color: #ff2a2a;
    font-weight: bold;
}

nav {
    display: flex;
    background: #1c1c1c;
}

nav button {
    flex: 1;
    padding: 15px;
    border: none;
    background: #1c1c1c;
    color: white;
    cursor: pointer;
}

nav button.active {
    background: #ff2a2a;
}

section {
    display: none;
    padding: 20px;
}

section.active {
    display: block;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    border: none;
}

button.action {
    margin-top: 10px;
    padding: 12px;
    background: #ff2a2a;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

.player-card {
    background: #1c1c1c;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}

.months {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
}

.error {
    color: #ff4d4d;
    margin-top: 5px;
}
</style>
</head>

<body>

<header>Dart Team Manager</header>

<nav>
<button onclick="showTab('spieler', this)" class="active">Spieler</button>
<button onclick="showTab('kader', this)">Kader</button>
<button onclick="showTab('bearbeiten', this)">Bearbeiten</button>
</nav>

<!-- SPIELER -->
<section id="spieler" class="active">
<h2>Spieler hinzufügen</h2>
<input type="text" id="nameInput" placeholder="Name">
<div id="errorMsg" class="error"></div>
<button class="action" onclick="addPlayer()">Hinzufügen</button>

<h2>Spieler löschen</h2>
<select id="deleteSelect"></select>
<button class="action" onclick="deletePlayer()">Löschen</button>
</section>

<!-- KADER -->
<section id="kader">
<h2>Kader</h2>
<div id="kaderListe"></div>
</section>

<!-- BEARBEITEN -->
<section id="bearbeiten">
<h2>Spieler bearbeiten</h2>
<select id="editSelect" onchange="loadPlayer()"></select>

<input type="date" id="editGeburtstag">
<input type="text" id="editTrikot" placeholder="Trikotgröße">
<input type="number" id="editBeitrag" placeholder="Monatsbeitrag €">
<input type="number" id="editFelgen" placeholder="Felgenwürfe">

<h3>Monatsbeiträge</h3>
<div class="months" id="monthsContainer"></div>

<button class="action" onclick="saveChanges()">Speichern</button>
</section>

<script>
let players = JSON.parse(localStorage.getItem("players")) || [];

const months = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];

function saveData() {
    localStorage.setItem("players", JSON.stringify(players));
}

function showTab(tabId, btn) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");

    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    updateUI();
}

function addPlayer() {
    const input = document.getElementById("nameInput");
    const error = document.getElementById("errorMsg");

    if (!input.value.trim()) {
        error.textContent = "Bitte Namen eingeben!";
        return;
    }

    error.textContent = "";

    players.push({
        name: input.value.trim(),
        geburtstag: "",
        trikot: "",
        beitrag: "",
        felgen: "",
        months: Array(12).fill(false)
    });

    input.value = "";
    saveData();
    updateUI();
}

function deletePlayer() {
    const index = document.getElementById("deleteSelect").value;
    if (index === "") return;

    players.splice(index, 1);
    saveData();
    updateUI();
}

function updateUI() {
    const kader = document.getElementById("kaderListe");
    const deleteSel = document.getElementById("deleteSelect");
    const editSel = document.getElementById("editSelect");

    kader.innerHTML = "";
    deleteSel.innerHTML = "";
    editSel.innerHTML = "";

    players.forEach((p, i) => {
        kader.innerHTML += `
<div class="player-card">
            <strong>${p.name}</strong><br>
            Geburtstag: ${p.geburtstag || "-"}<br>
            Trikot: ${p.trikot || "-"}<br>
            Beitrag: ${p.beitrag || "-"}€<br>
            Felgenwürfe: ${p.felgen || "-"}
        </div>`;

        deleteSel.innerHTML += <option value="${i}">${p.name}</option>;
        editSel.innerHTML += <option value="${i}">${p.name}</option>;
    });

    loadPlayer();
}

function loadPlayer() {
    const index = document.getElementById("editSelect").value;
    if (!players[index]) return;

    const p = players[index];

    document.getElementById("editGeburtstag").value = p.geburtstag;
    document.getElementById("editTrikot").value = p.trikot;
    document.getElementById("editBeitrag").value = p.beitrag;
    document.getElementById("editFelgen").value = p.felgen;

    const container = document.getElementById("monthsContainer");
    container.innerHTML = "";

    months.forEach((m, i) => {
        container.innerHTML += `
        <label>
            <input type="checkbox" ${p.months[i] ? "checked" : ""} onchange="toggleMonth(${i})">
            ${m}
        </label>`;
    });
}

function toggleMonth(i) {
    const index = document.getElementById("editSelect").value;
    players[index].months[i] = !players[index].months[i];
    saveData();
}

function saveChanges() {
    const index = document.getElementById("editSelect").value;
    const p = players[index];

    p.geburtstag = document.getElementById("editGeburtstag").value;
    p.trikot = document.getElementById("editTrikot").value;
    p.beitrag = document.getElementById("editBeitrag").value;
    p.felgen = document.getElementById("editFelgen").value;

    saveData();
    updateUI();
}

updateUI();
</script>

</body>
</html>
