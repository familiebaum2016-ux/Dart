<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Manager Pro</title>
    <style>
        :root {
            --red: #e63946;
            --black: #1a1a1a;
            --white: #ffffff;
            --gray: #f4f4f4;
            --dark-gray: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--white);
            color: var(--black);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--black);
            color: var(--white);
            padding: 1rem;
            text-align: center;
            border-bottom: 4px solid var(--red);
        }

        nav {
            display: flex;
            justify-content: center;
            background: var(--dark-gray);
        }

        nav button {
            background: none;
            border: none;
            color: white;
            padding: 1rem 2rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        nav button:hover, nav button.active {
            background-color: var(--red);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .section {
            display: none;
            animation: fadeIn 0.5s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card {
            background: var(--white);
            border: 1px solid #ddd;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 { border-left: 5px solid var(--red); padding-left: 10px; }

        input, select {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0 1.5rem 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button.primary {
            background-color: var(--red);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
        }

        button.delete-btn {
            background: none;
            color: var(--red);
            border: 1px solid var(--red);
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            border-radius: 4px;
        }

        /* Tabelle Styling */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            background-color: var(--black);
            color: var(--white);
            text-align: left;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover { background-color: #f9f9f9; }

        .months-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
        }

        .month-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
        }

        .month-item input {
            width: auto;
            margin: 0 5px 0 0;
        }

        .status-paid { color: green; font-weight: bold; }
        .status-unpaid { color: #ccc; }

    </style>
</head>
<body>

<header>
    <h1>TEAM MANAGER PRO</h1>
</header>

<nav>
    <button onclick="showSection('spieler')" id="btn-spieler" class="active">SPIELER</button>
    <button onclick="showSection('bearbeiten')" id="btn-bearbeiten">BEARBEITEN</button>
<button onclick="showSection('kader')" id="btn-kader">KADER</button>
</nav>

<div class="container">
    
    <div id="spieler" class="section active">
        <div class="card">
            <h2>Neuen Spieler anlegen</h2>
            <input type="text" id="playerName" placeholder="Vor- und Nachname">
            <input type="date" id="playerDob" title="Geburtsdatum">
            <button class="primary" onclick="addPlayer()">Spieler Speichern</button>
            
            <h3 style="margin-top:2rem">Aktuelle Liste</h3>
            <ul id="playerList" style="list-style: none; padding: 0;"></ul>
        </div>
    </div>

    <div id="bearbeiten" class="section">
        <div class="card">
            <h2>Daten bearbeiten</h2>
            <label>Spieler auswählen:</label>
            <select id="editPlayerSelect" onchange="loadPlayerData()">
                <option value="">-- Bitte wählen --</option>
            </select>

            <div id="editFields" style="display:none;">
                <label>Trikotgröße:</label>
                <input type="text" id="editSize" placeholder="z.B. L oder XL">
                
                <label>Felgenwürfe:</label>
                <input type="number" id="editThrows" placeholder="Anzahl">

                <label>Monatsbeiträge (Bezahlt markieren):</label>
                <div class="months-grid" id="monthsGrid">
                    </div>
                
                <button class="primary" style="margin-top: 1.5rem;" onclick="saveChanges()">Änderungen speichern</button>
            </div>
        </div>
    </div>

    <div id="kader" class="section">
        <div class="card">
            <h2>Gesamter Kader</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Geburtstag</th>
                            <th>Größe</th>
                            <th>Würfe</th>
                            <th>Beiträge (J-D)</th>
                        </tr>
                    </thead>
                    <tbody id="kaderTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    let players = JSON.parse(localStorage.getItem('teamData')) || [];
    const months = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];

    // Navigation
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        
        if(id === 'bearbeiten') updatePlayerDropdown();
        if(id === 'kader') renderKader();
    }

    // Spieler hinzufügen
    function addPlayer() {
        const name = document.getElementById('playerName').value;
        const dob = document.getElementById('playerDob').value;
        if(!name) return alert("Name fehlt!");

        const newPlayer = {
            id: Date.now(),
            name: name,
            dob: dob || "-",
            size: "-",
            throws: 0,
            payments: new Array(12).fill(false)
        };

        players.push(newPlayer);
        saveToLocal();
        document.getElementById('playerName').value = "";
        document.getElementById('playerDob').value = "";
        renderPlayerList();
    }

    function deletePlayer(id) {
        players = players.filter(p => p.id !== id);
        saveToLocal();
        renderPlayerList();
    }

    function renderPlayerList() {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        players.forEach(p => {
            list.innerHTML += `<li style="display:flex; justify-content:between; align-items:center; padding: 10px; border-bottom:1px solid #eee;">
                <span style="flex-grow:1">${p.name}</span>
<button class="delete-btn" onclick="deletePlayer(${p.id})">Löschen</button>
            </li>`;
        });
    }

    // Bearbeiten Logik
    function updatePlayerDropdown() {
        const select = document.getElementById('editPlayerSelect');
        select.innerHTML = '<option value="">-- Bitte wählen --</option>';
        players.forEach(p => {
            select.innerHTML += <option value="${p.id}">${p.name}</option>;
        });
        document.getElementById('editFields').style.display = "none";
    }

    function loadPlayerData() {
        const id = document.getElementById('editPlayerSelect').value;
        if(!id) return;
        
        const player = players.find(p => p.id == id);
        document.getElementById('editFields').style.display = "block";
        document.getElementById('editSize').value = player.size;
        document.getElementById('editThrows').value = player.throws;

        const grid = document.getElementById('monthsGrid');
        grid.innerHTML = "";
        months.forEach((m, index) => {
            grid.innerHTML += `
                <div class="month-item">
                    <input type="checkbox" id="m-${index}" ${player.payments[index] ? 'checked' : ''}>
                    <label for="m-${index}">${m}</label>
                </div>
            `;
        });
    }

    function saveChanges() {
        const id = document.getElementById('editPlayerSelect').value;
        const playerIndex = players.findIndex(p => p.id == id);
        
        players[playerIndex].size = document.getElementById('editSize').value;
        players[playerIndex].throws = document.getElementById('editThrows').value;
        
        months.forEach((_, index) => {
            players[playerIndex].payments[index] = document.getElementById(`m-${index}`).checked;
        });

        saveToLocal();
        alert("Daten für " + players[playerIndex].name + " gespeichert!");
    }

    // Kader Anzeige
    function renderKader() {
        const tbody = document.getElementById('kaderTableBody');
        tbody.innerHTML = "";
        players.forEach(p => {
            let paymentStatus = p.payments.map((paid, i) => 
                <span class="${paid ? 'status-paid' : 'status-unpaid'}" title="${months[i]}">${months[i][0]}</span>
            ).join(" ");

            tbody.innerHTML += `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.dob}</td>
                    <td>${p.size}</td>
                    <td>${p.throws}</td>
                    <td>${paymentStatus}</td>
                </tr>
            `;
        });
    }

    function saveToLocal() {
        localStorage.setItem('teamData', JSON.stringify(players));
    }

    // Initial Start
    renderPlayerList();
</script>

</body>
</html>
