<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Manager Pro</title>
    <style>
        :root { --red: #e63946; --black: #1a1a1a; --white: #ffffff; --gray: #f4f4f4; --dark-gray: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--white); color: var(--black); margin: 0; padding: 0; }
        header { background-color: var(--black); color: var(--white); padding: 1rem; text-align: center; border-bottom: 4px solid var(--red); }
        nav { display: flex; justify-content: center; background: var(--dark-gray); }
        nav button { background: none; border: none; color: white; padding: 1rem 2rem; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button:hover, nav button.active { background-color: var(--red); }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--white); border: 1px solid #ddd; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-left: 5px solid var(--red); padding-left: 10px; }
        input { width: 100%; padding: 0.8rem; margin: 0.5rem 0 1.5rem 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button.primary { background-color: var(--red); color: white; border: none; padding: 1rem 2rem; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; }
        .player-select-btn { padding: 10px; margin: 5px; border: 1px solid #ddd; cursor: pointer; display: inline-block; background: #f9f9f9; border-radius: 4px; font-weight: bold; }
        .player-select-btn:hover { border-color: var(--red); }
        .player-select-btn.active { background: var(--red); color: white; border-color: var(--red); }
        .delete-btn { background: none; color: var(--red); border: 1px solid var(--red); padding: 0.3rem 0.6rem; cursor: pointer; border-radius: 4px; margin-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { background-color: var(--black); color: var(--white); text-align: left; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .months-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #f9f9f9; padding: 10px; border-radius: 4px; }
        .month-tag { display: inline-block; width: 20px; height: 20px; text-align: center; line-height: 20px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; margin-right: 2px; }
        .paid { background-color: #2ecc71; color: white; }
        .unpaid { background-color: #ddd; color: #999; }
    </style>
</head>
<body>

<header><h1>TEAM MANAGER PRO</h1></header>

<nav>
    <button onclick="showSection('spieler')" id="btn-spieler" class="active">SPIELER</button>
    <button onclick="showSection('bearbeiten')" id="btn-bearbeiten">BEARBEITEN</button>
    <button onclick="showSection('kader')" id="btn-kader">KADER</button>
</nav>

<div class="container">
    
    <div id="spieler" class="section active">
        <div class="card">
            <h2>Spieler hinzufügen</h2>
            <input type="text" id="playerName" placeholder="Name des Spielers">
            <button class="primary" onclick="addPlayer()">Hinzufügen</button>
            <h3 style="margin-top:2rem">Aktuelle Liste</h3>
            <div id="playerList"></div>
        </div>
    </div>

    <div id="bearbeiten" class="section">
        <div class="card">
            <h2>Spieler auswählen</h2>
            <div id="editSelectionList"></div>
            <div id="editFields" style="display:none; margin-top: 2rem; border-top: 2px solid #eee; padding-top: 1rem;">
                <h3 id="editingNameDisplay"></h3>
                <label>Geburtsdatum:</label>
<input type="date" id="editDob">
                <label>Trikotgröße:</label>
                <input type="text" id="editSize" placeholder="z.B. XL">
                <label>Felge:</label>
                <input type="number" id="editFelge" placeholder="Anzahl">
                <label>Monatsbeiträge (Jan - Dez):</label>
                <div class="months-grid" id="monthsGrid"></div>
                <button class="primary" style="margin-top: 1.5rem;" onclick="saveChanges()">Speichern</button>
            </div>
        </div>
    </div>

    <div id="kader" class="section">
        <div class="card">
            <h2>Kader Übersicht</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>Name</th><th>Geburtstag</th><th>Größe</th><th>Felge</th><th>Beiträge</th></tr>
                    </thead>
                    <tbody id="kaderTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('teamData')) || [];
    let currentPlayerId = null;
    const months = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'spieler') renderPlayerList();
        if(id === 'bearbeiten') renderEditSelection();
        if(id === 'kader') renderKader();
    }

    function addPlayer() {
        const name = document.getElementById('playerName').value;
        if(!name) return;
        const newPlayer = {
            id: Date.now(),
            name: name,
            dob: "",
            size: "-",
            felge: 0,
            payments: new Array(12).fill(false)
        };
        players.push(newPlayer);
        save();
        document.getElementById('playerName').value = "";
        renderPlayerList();
    }

    function deletePlayer(id) {
        players = players.filter(p => p.id !== id);
        save();
        renderPlayerList();
    }

    function renderPlayerList() {
        const list = document.getElementById('playerList');
        list.innerHTML = players.map(p => `
            <div style="padding:10px; border-bottom:1px solid #eee;">
                ${p.name} <button class="delete-btn" onclick="deletePlayer(${p.id})">Löschen</button>
            </div>
        `).join('');
    }

    function renderEditSelection() {
        const list = document.getElementById('editSelectionList');
        list.innerHTML = players.map(p => `
            <div class="player-select-btn ${currentPlayerId == p.id ? 'active' : ''}" onclick="loadPlayer(${p.id})">${p.name}</div>
        `).join('');
    }

    function loadPlayer(id) {
        currentPlayerId = id;
        const p = players.find(p => p.id == id);
        renderEditSelection();
        document.getElementById('editFields').style.display = "block";
        document.getElementById('editingNameDisplay').innerText = p.name + " bearbeiten";
        document.getElementById('editDob').value = p.dob;
        document.getElementById('editSize').value = p.size;
        document.getElementById('editFelge').value = p.felge;
        const grid = document.getElementById('monthsGrid');
        grid.innerHTML = months.map((m, i) => `
            <div><input type="checkbox" id="m-${i}" ${p.payments[i] ? 'checked' : ''}> ${m}</div>
        `).join('');
    }

    function saveChanges() {
        const p = players.find(p => p.id == currentPlayerId);
        p.dob = document.getElementById('editDob').value;
        p.size = document.getElementById('editSize').value;
        p.felge = document.getElementById('editFelge').value;
        p.payments = months.map((_, i) => document.getElementById(`m-${i}`).checked);
        save();
alert("Gespeichert!");
    }

    function renderKader() {
        const tbody = document.getElementById('kaderTableBody');
        tbody.innerHTML = players.map(p => {
            const date = p.dob ? p.dob.split('-').reverse().join('.') : "-";
            const payTags = p.payments.map((paid, i) => `<span class="month-tag ${paid ? 'paid' : 'unpaid'}">${months[i][0]}</span>`).join('');
            return <tr><td>${p.name}</td><td>${date}</td><td>${p.size}</td><td>${p.felge}</td><td>${payTags}</td></tr>;
        }).join('');
    }

    function save() { localStorage.setItem('teamData', JSON.stringify(players)); }
    renderPlayerList();
</script>
</body>
</html>
